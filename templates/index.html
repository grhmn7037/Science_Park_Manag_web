<!DOCTYPE html>

    <style>
        /* تنسيق القسم العلوي ليكون منقسماً */
.top-header-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 60%;
    max-width: 1200px;
    margin: 0 auto 30px auto;
    padding: 20px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 30px;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* تنسيق صندوق الباركود على اليسار */
.qr-side-box {
    background: white;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    border: 3px solid #686de0;
    margin-right: 40px; /* مسافة بينه وبين النص */
    animation: fadeInScale 1s ease-out;
}

.qr-side-box img {
    width: 160px; /* حجم مناسب للباركود في الأعلى */
    height: 160px;
}

.qr-mini-text {
    color: #4834d4;
    font-weight: bold;
    font-size: 14px;
    margin-top: 8px;
}

/* الحفاظ على تنسيق النص المحفز كما هو */
.shimmer-text {
    font-size: 38px;
    font-weight: 900;
    background: linear-gradient(to right, #ffffff, #be2edd, #ffffff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

/* حركة ظهور الباركود */
@keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.5); }
    to { opacity: 1; transform: scale(1); }
}
 /* تصميم منطقة التحفيز المبهرة */
.motivation-hero {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: fadeInScale 1.2s ease-out;
}

.shimmer-text {
    font-size: 42px; /* خط ضخم */
    font-weight: 900;
    background: linear-gradient(to right, #4834d4, #be2edd, #4834d4);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    margin-bottom: 15px;
}

.quote-box {
    font-size: 20px;
    color: #444;
    font-style: italic;
    line-height: 1.6;
    margin: 15px 0;
    position: relative;
    padding: 0 20px;
}

.quote-mark {
    font-size: 50px;
    color: #686de0;
    opacity: 0.3;
    font-family: serif;
}

.action-banner {
    font-size: 24px;
    font-weight: bold;
    color: #1e3c72;
    background: #f9f9f9;
    display: inline-block;
    padding: 10px 25px;
    border-radius: 50px;
    margin-top: 15px;
    border: 2px dashed #686de0;
}

.highlight {
    color: #be2edd;
    text-shadow: 0 0 10px rgba(190, 46, 221, 0.3);
}

/* الحركات الحية */
@keyframes shine {
    to { background-position: 200% center; }
}

@keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* حركة الزر لجعل المستخدم يتشجع للضغط */
button {
    font-size: 22px !important;
    letter-spacing: 1px;
    text-transform: uppercase;
}
        body { font-family: 'Segoe UI'; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: 0; padding: 20px; min-height: 100vh; }
